start = 1993-01-01T00:00:00
end = 2021-07-01T00:00:00
freq = '1D'
array_step = '10 W'
checks = ['global_ecmwf_coords', 'dates', 'values']

[[datasets]]
name = 'era5'
provider = 'gcs'
type = 'timeseries'
tmp_step = '2 W'

[[datasets.parts]]
url = 'gs://gcp-public-data-arco-era5/ar/full_37-1h-0p25deg-chunk-1.zarr-v3'
variables = [
    '10m_u_component_of_wind',
    '10m_v_component_of_wind',
    '2m_dewpoint_temperature',
    '2m_temperature',
    'instantaneous_10m_wind_gust',
    'surface_pressure',
    'surface_solar_radiation_downwards',
    'surface_thermal_radiation_downwards',
    'total_precipitation']
storage_options = {token = 'anon'}

[[datasets.postprocess]]
name = 'isel'
level = 0
drop = true

[[datasets.postprocess]]
name = 'flip'
dim = 'latitude'

[[datasets.postprocess]]
name = 'resample'
time = '1 D'
label = 'left'
closed = 'left'
reduce = 'mean'

[[datasets.postprocess]]
name = 'rescale'

[datasets.postprocess.values]
total_precipitation = 24.0
surface_solar_radiation_downwards = 24.0
surface_thermal_radiation_downwards = 24.0

[[datasets.postprocess]]
name = 'clip_negative'
variables = ['total_precipitation']

[[datasets.postprocess]]
name = 'rename'

[datasets.postprocess.name_dict]
10m_u_component_of_wind = '10u'
10m_v_component_of_wind = '10v'
2m_dewpoint_temperature = '2d'
2m_temperature = '2t'
instantaneous_10m_wind_gust = 'i10fg'
surface_pressure = 'sp'
surface_solar_radiation_downwards = 'ssrd'
surface_thermal_radiation_downwards = 'strd'
total_precipitation = 'tp'

[[datasets.postprocess]]
name = 'rename_coordinates'
name_dict = {latitude = 'lat', longitude = 'lon'}

# ==== ERA5 STATIC ====

[[datasets]]
name = 'era5_static'
provider = 'gcs'
type = 'static'
tmp_step = '2 W'

[[datasets.parts]]
url = 'gs://weatherbench2/datasets/era5/1959-2023_01_10-wb13-6h-1440x721_with_derived_variables.zarr'
storage_options = {token = 'anon'}
variables = ['land_sea_mask', 'geopotential_at_surface']

[[datasets.postprocess]]
name = 'drop_vars'
names = ['time', 'level']

[[datasets.postprocess]]
name = 'flip'
dim = 'latitude'

[[datasets.postprocess]]
name = 'rename'
name_dict = {land_sea_mask = 'lsm', geopotential_at_surface = 'z'}

[[datasets.postprocess]]
name = 'rename_coordinates'
name_dict = {latitude = 'lat', longitude = 'lon'}

# ==== GLOFAS SECTION ====

[[datasets]]
name = 'glofas'
provider = 'cds'
type = 'timeseries'
tmp_step = '2 W'

[[datasets.parts]]
dataset = 'cems-glofas-historical'
system_version = ['version_4_0']
hydrological_model = ['lisflood']
product_type = ['consolidated']
variable = ['river_discharge_in_the_last_24_hours']
data_format = 'grib2'
download_format = 'zip'

[[datasets.postprocess]]
name = 'regrid'
method = 'conservative'
latitude_dim = 'latitude'
longitude_dim = 'longitude'
kwargs = {skipna = true, nan_threshold = 0.0}
grid = {south = -90.0, north = 90.0, west = 0.0, east = 359.75, resolution_lat = 0.25, resolution_lon = 0.25}

[[datasets.postprocess]]
name = 'astype'
casting = 'same_kind'
dtype = 'float32'

[[datasets.postprocess]]
name = 'rename_coordinates'
name_dict = {latitude = 'lat', longitude = 'lon'}

[datasets.mask]
provider = 'url'
type = 'static'
variable = 'glofas_mask'

[[datasets.mask.parts]]
url = 'https://confluence.ecmwf.int/download/attachments/242067380/uparea_glofas_v4_0.nc'

[[datasets.mask.postprocess]]
name = 'regrid'
method = 'conservative'
latitude_dim = 'latitude'
longitude_dim = 'longitude'
kwargs = {skipna = true, nan_threshold = 0.0}
grid = {south = -90.0, north = 90.0, west = 0.0, east = 359.75, resolution_lat = 0.25, resolution_lon = 0.25}

[[datasets.mask.postprocess]]
name = 'astype'
elevation = {dtype = 'float32', casting='same_kind'}
uparea = {dtype = 'float32', casting='same_kind'}

[[datasets.mask.postprocess]]
name = 'get_land_mask'
variable = 'uparea'
mask_name = 'glofas_mask'

[[datasets.mask.postprocess]]
name = 'rename_coordinates'
name_dict = {latitude = 'lat', longitude = 'lon'}

# ==== GLORYS SECTION ====

[[datasets]]
name = 'glorys'
provider = 'cm'
type = 'timeseries'
tmp_step = '2 W'

[[datasets.parts]]
dataset_id = 'cmems_mod_glo_phy_my_0.083deg_P1D-m'
dataset_version = '202311'
variables = ['uo', 'vo', 'so', 'thetao', 'mlotst', 'zos', 'sithick', 'siconc', 'usi', 'vsi']
dataset_part = 'default'
service = 'arco-geo-series'

[[datasets.postprocess]]
name = 'isel'
depth = [0, 4, 8, 12, 16, 20, 24, 28, 32, 34]

[[datasets.postprocess]]
name = 'regrid'
method = 'conservative'
latitude_dim = 'latitude'
longitude_dim = 'longitude'
kwargs = {skipna = true}
grid = {south = -90.0, north = 90.0, west = 0.0, east = 359.75, resolution_lat = 0.25, resolution_lon = 0.25}

[[datasets.postprocess]]
name = 'astype'
casting = 'same_kind'
dtype = 'float32'

[[datasets.postprocess]]
name = 'rename_coordinates'
name_dict = {latitude = 'lat', longitude = 'lon', depth = 'level'}
set_new_coordinate = {'level' = [0, 4, 8, 12, 16, 20, 24, 28, 32, 34]}

[[datasets.postprocess]]
name = 'fill'
variables = ['usi', 'vsi', 'sithick', 'siconc']

[[datasets.postprocess]]
name = 'gauss_fill'
variables = ['so', 'thetao', 'vo', 'uo', 'mlotst', 'zos']
sigma = 1.0
radius = 4
mode = 'mirror'
output = 'float32'

[datasets.mask]
provider = 'cm'
type = 'static'
variable = 'glorys_mask'

[[datasets.mask.parts]]
dataset_id = 'cmems_mod_glo_phy_my_0.083deg_static'
dataset_version = '202311'
variables = ['deptho', 'depth']
dataset_part = 'bathy'
service = 'static-arco'

[[datasets.mask.postprocess]]
name = 'isel'
depth = [0, 4, 8, 12, 16, 20, 24, 28, 32, 34]

[[datasets.mask.postprocess]]
name = 'regrid'
method = 'conservative'
latitude_dim = 'latitude'
longitude_dim = 'longitude'
kwargs = {skipna = true}
grid = {south = -90.0, north = 90.0, west = 0.0, east = 359.75, resolution_lat = 0.25, resolution_lon = 0.25}

[[datasets.mask.postprocess]]
name = 'astype'
dtype = 'float32'
casting = 'same_kind'

[[datasets.mask.postprocess]]
name = 'rename'
name_dict = {deptho = 'glorys_deptho'}

[[datasets.mask.postprocess]]
name = 'get_sea_mask'
bathymetry = 'glorys_deptho'
depth_coordinate = 'depth'
depth_dim = 'depth'
mask_name = 'glorys_mask'

[[datasets.mask.postprocess]]
name = 'rename_coordinates'
name_dict = {latitude = 'lat', longitude = 'lon', depth = 'level'}
set_new_coordinate = {'level' = [0, 4, 8, 12, 16, 20, 24, 28, 32, 34]}

# ==== WAVERYS SECTION ====

[[datasets]]
name = 'waverys'
provider = 'cm'
type = 'timeseries'
tmp_step = '2 W'

[[datasets.parts]]
dataset_id = 'cmems_mod_glo_wav_my_0.2deg_PT3H-i'
dataset_version = '202411'
variables = ['VHM0', 'VTM02', 'VMDR', 'VSDX', 'VSDY']
dataset_part = 'default'
service = 'arco-geo-series'

[[datasets.postprocess]]
name = 'regrid'
method = 'conservative'
latitude_dim = 'latitude'
longitude_dim = 'longitude'
kwargs = {skipna = true}
grid = {south = -90.0, north = 90.0, west = 0.0, east = 359.75, resolution_lat = 0.25, resolution_lon = 0.25}

[[datasets.postprocess]]
name = 'resample'
time = '1 D'
label = 'left'
closed = 'left'
reduce = 'mean'

[[datasets.postprocess]]
name = 'astype'
casting = 'same_kind'
dtype = 'float32'

[[datasets.postprocess]]
name = 'rename'
name_dict = {VHM0 = 'swh', VTM02 = 'swp', VSDX = 'usd', VSDY = 'vsd', VMDR = 'mwd'}

[[datasets.postprocess]]
name = 'rename_coordinates'
name_dict = {latitude = 'lat', longitude = 'lon'}

[[datasets.postprocess]]
name = 'fill'
variables = ['swh', 'swp', 'mwd', 'usd', 'vsd']

[datasets.mask]
provider = 'cm'
type = 'static'
variable = 'waverys_mask'

[[datasets.mask.parts]]
dataset_id = 'cmems_mod_glo_wav_my_0.2deg_static'
dataset_version = '202311'
variables = ['deptho']
dataset_part = 'bathy'
service = 'static-arco'

[[datasets.mask.postprocess]]
name = 'regrid'
method = 'conservative'
latitude_dim = 'latitude'
longitude_dim = 'longitude'
kwargs = {skipna = true}
grid = {south = -90.0, north = 90.0, west = 0.0, east = 359.75, resolution_lat = 0.25, resolution_lon = 0.25}

[[datasets.mask.postprocess]]
name = 'astype'
dtype = 'float32'
casting = 'same_kind'

[[datasets.mask.postprocess]]
name = 'get_land_mask'
variable = 'deptho'
mask_name = 'waverys_mask'

[[datasets.mask.postprocess]]
name = 'rename'
name_dict = {deptho = 'waverys_deptho'}

[[datasets.mask.postprocess]]
name = 'rename_coordinates'
name_dict = {latitude = 'lat', longitude = 'lon'}

# ==== SAVING SECTION ====

[save]
consolidated = true
chunk = {time = 1, level = -1, lat = -1, lon = -1}
compressor = {cname = 'lz4', clevel = 1}

[[save.postprocess]]
name = 'transpose'
dims = ['time', 'level', 'lat', 'lon']
