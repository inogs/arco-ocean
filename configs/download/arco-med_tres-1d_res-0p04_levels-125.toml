[datasets.mask]
provider = 'cm'
type = 'static'
variable = 'medsea_phys_mask'

[[datasets.mask.parts]]
dataset_id = 'cmems_mod_med_phy_my_4.2km_static'
 dataset_version = '202211'
variables = ['deptho', 'depth']
dataset_part = 'bathy'
service = 'static-arco'

[[datasets.mask.postprocess]]
name = 'regrid'
method = 'conservative'
latitude_dim = 'latitude'
longitude_dim = 'longitude'
kwargs = {skipna = true}
grid = {south = 30.00, north = 46.00, west = -5.60, east = 36.40, resolution_lat = 0.04, resolution_lon = 0.04}

[[datasets.mask.postprocess]]
name = 'astype'
dtype = 'float32'
casting = 'same_kind'

[[datasets.mask.postprocess]]
name = 'rename'
name_dict = {deptho = 'medsea_phys_deptho'}

[[datasets.mask.postprocess]]
name = 'get_sea_mask'
bathymetry = 'medsea_phys_deptho'
depth_coordinate = 'depth'
depth_dim = 'depth'
mask_name = 'medsea_phys_mask'

[[datasets.mask.postprocess]]
name = 'rename_coordinates'
name_dict = {latitude = 'lat', longitude = 'lon', depth = 'level'}
set_new_coordinate = {'level' = 'auto'}

# ==== MEDSEA WAVE SECTION ====

[[datasets]]
name = 'medsea_wave'
provider = 'cm'
type = 'timeseries'
tmp_step = '2 W'

[[datasets.parts]]
dataset_id = 'cmems_mod_med_wav_my_4.2km_PT1H-i'
