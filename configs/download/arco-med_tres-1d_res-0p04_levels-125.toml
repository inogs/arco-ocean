depth = {start = 0, end = 125}

[[datasets.postprocess]]
name = 'regrid'
method = 'conservative'
latitude_dim = 'latitude'
longitude_dim = 'longitude'
kwargs = {skipna = true}
grid = {south = 30.00, north = 46.00, west = -5.60, east = 36.40, resolution_lat = 0.04, resolution_lon = 0.04}

[[datasets.postprocess]]
name = 'astype'
casting = 'same_kind'
